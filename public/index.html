<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UWU MART</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #006643; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #004d32; }
        .link { text-align: right; display: block; font-size: 13px; color: #006643; text-decoration: none; margin-top: 5px; }
        .title { color: #006643; text-align: center; margin-bottom: 15px; margin-top: 0; }
    </style>
</head>
<body>

    <!-- LOGIN BOX -->
    <div class="box" id="login-section">
        <h2 class="title">Login to UWU Mart</h2>
        <input type="email" id="login-email" placeholder="Campus Email (@std.uwu.ac.lk)">
        <input type="password" id="login-password" placeholder="Password">
        <button id="btn-login">Log In</button>
        <a href="#" class="link" id="link-goto-register">Don't have an account? Register</a>
        <a href="#" class="link" id="link-forgot-password">Forgot Password?</a>
    </div>

    <!-- REGISTER BOX -->
    <div class="box" id="register-section" style="display: none;">
        <h2 class="title">Create Account</h2>
        <input type="email" id="reg-email" placeholder="Campus Email">
        <button id="btn-reg-otp">Get Verification OTP</button>
        
        <input type="text" id="reg-otp" placeholder="Enter 6-Digit OTP">
        <input type="text" id="reg-name" placeholder="Full Name">
        <input type="text" id="reg-id" placeholder="Student ID (e.g., ICT24067)">
        <input type="text" id="reg-phone" placeholder="WhatsApp Number">
        
        <label style="font-size: 12px; color: #555; display: block; margin-top: 5px;">Choose Profile Photo from Gallery:</label>
        <input type="file" id="reg-photo" accept="image/*">
        
        <select id="reg-role">
            <option value="Student">Student</option>
            <option value="Delivery">Delivery Rider</option>
        </select>
        <input type="password" id="reg-password" placeholder="Create Password">
        <button id="btn-register">Register Now</button>
        <a href="#" class="link" id="link-goto-login">Already have an account? Login</a>
    </div>

    <!-- FORGOT PASSWORD BOX -->
    <div class="box" id="forgot-section" style="display: none;">
        <h2 class="title">Reset Password</h2>
        <input type="email" id="forgot-email" placeholder="Enter Campus Email">
        <button id="btn-forgot-otp">Send Reset Code</button>
        
        <div id="forgot-reset-fields" style="display: none;">
            <input type="text" id="forgot-otp" placeholder="Enter Reset OTP">
            <input type="password" id="forgot-new-pass" placeholder="Enter New Password">
            <button id="btn-confirm-reset">Update Password</button>
        </div>
        <a href="#" class="link" id="link-forgot-back">Back to Login</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
