<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UWU MART - Campus Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">UWU <span class="highlight">MART</span></a>
            <div class="nav-links">
                <a href="#items">Browse Items</a>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container">
        
        <header class="hero-section">
            <h1>UWU Campus Marketplace</h1>
            <p>Direct WhatsApp connections for instant trading inside the university network.</p>
        </header>

        <!-- Marketplace Section -->
        <section id="items" class="marketplace-section">
            <h2>Available Items for Sale</h2>
            <!-- Items Loaded Dynamically from Backend -->
            <div class="items-grid" id="itemsContainer">
                <p style="text-align: center; color: #64748b;">Loading active listings...</p>
            </div>
        </section>

    </main>

    <!-- 🧠 AUTOMATED CLIENT-SIDE LOGIC -->
    <script>
        // 🛠️ WhatsApp Number Formatting Helper (ඔන්න ලෙඩේ හොඳ කරපු තැන!)
        function generateWhatsAppLink(phoneNumber) {
            if (!phoneNumber) return '#';
            
            // ඉලක්කම් ටික විතරක් ඉතිරි කරලා අනෙක් හැමදේම අයින් කරනවා (+, -, හිස්තැන්)
            let cleaned = phoneNumber.toString().replace(/[^0-9]/g, '');
            
            // නම්බර් එක මුලට 0 තිබ්බොත් ඒක අයින් කරලා 94 එකතු කරනවා
            if (cleaned.startsWith('0')) {
                cleaned = '94' + cleaned.substring(1);
            }
            
            // නම්බර් එක මුලට 94 නැතිව 77/70/71 වගේ පටන් ගත්තොත් 94 දානවා
            if (!cleaned.startsWith('94') && cleaned.length === 9) {
                cleaned = '94' + cleaned;
            }
            
            return `https://wa.me/${cleaned}`;
        }

        // 🛍️ FETCH AND RENDER MARKETPLACE ITEMS
        async function fetchMarketplaceItems() {
            const container = document.getElementById('itemsContainer');
            try {
                const response = await fetch('/api/items');
                const items = await response.json();

                if (!items || items.length === 0) {
                    container.innerHTML = `<p style="text-align: center; color: #64748b; grid-column: 1/-1;">No items posted yet. Be the first to post!</p>`;
                    return;
                }

                container.innerHTML = ''; // Loading text එක අයින් කරනවා

                items.forEach(item => {
                    // WhatsApp ලින්ක් එක ඔටෝ ෆෝමැට් කරගන්නවා
                    const formattedWhatsApp = generateWhatsAppLink(item.whatsapp);
                    
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <img src="${item.imageUrl || 'https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=500'}" alt="${item.title}">
                        <div class="item-details">
                            <span class="category">${item.category || 'General'}</span>
                            <h3>${item.title}</h3>
                            <p class="price">LKR ${item.price}</p>
                            <p class="location">📍 ${item.location || 'Campus Premises'}</p>
                            <a href="${formattedWhatsApp}" target="_blank" class="whatsapp-btn">
                                💬 Contact Seller via WhatsApp
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Error loading items:", error);
                container.innerHTML = `<p style="text-align: center; color: #ef4444; grid-column: 1/-1;">Failed to sync with marketplace database.</p>`;
            }
        }

        // සයිට් එක ලෝඩ් වෙද්දීම Backend එකෙන් ඩේටා ටික ඇදලා ගන්නවා
        window.addEventListener('DOMContentLoaded', fetchMarketplaceItems);
    </script>
</body>
</html>
